name: PWManagerIOS
options:
  bundleIdPrefix: com.pwmanager
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top

attributes:
  ORGANIZATIONNAME: PWManager
  CLASSPREFIX: PWManager

packages:
  PWManagerCore:
    path: ".."

targets:
  PWManagerIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PWManagerIOS
        excludes:
          - "Info.plist"
    entitlements:
      path: PWManagerIOS/PWManagerIOS.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.pwmanager.ios
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.pwmanager.ios
    info:
      path: PWManagerIOS/Info.plist
      properties:
        CFBundleDisplayName: PWManager
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        NSFaceIDUsageDescription: Unlock your vault with Face ID.
        UIUserInterfaceStyle: Dark
        UILaunchScreen:
          UIColorName: ""
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIFileSharingEnabled: false
        LSSupportsOpeningDocumentsInPlace: false
        NSUbiquitousContainers:
          iCloud.com.pwmanager.ios:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerSupportedFolderLevels: One
            NSUbiquitousContainerName: PWManager
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.pwmanager.pwmbackup
            UTTypeDescription: PWManager Encrypted Backup
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - pwmbackup
    dependencies:
      - package: PWManagerCore
        product: PWManagerCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pwmanager.ios
        PRODUCT_NAME: PWManager
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        GENERATE_INFOPLIST_FILE: NO
